<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Realistic CSS Bulb</title>

  <!-- external CSS file -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 💡 Bulb structure start -->
<div class="bulb">

  <!-- glass part (এখানেই light effect দেখানো হবে) -->
  <div class="glass" id="glass"></div>

  <!-- ভিতরের support wire -->
  <div class="support left"></div>
  <div class="support right"></div>

  <!-- filament (যেটা আসলে জ্বলে) -->
  <div class="filament" id="filament"></div>

  <!-- bulb stem (metal part inside) -->
  <div class="stem"></div>

  <!-- screw base -->
  <div class="base"></div>

  <!-- নিচের black tip -->
  <div class="tip"></div>

</div>
<!-- 💡 Bulb structure end -->


<!-- 🔘 control buttons -->
<div class="btn_div">

  <!-- light ON করার button -->
  <button class="showDetails_btn" onclick="turnOn()">On করুন</button>

  <!-- light OFF করার button -->
  <button class="showDetails_btn2" onclick="turnOff()">Off করুন</button>

</div>

<!-- JS file connect -->
<script src="app.js"></script>

</body>
</html>
